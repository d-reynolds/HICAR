# HICAR full-test (CPU / GNU, GitHub-hosted).
#
# The correctness gate. Two builds:
#   * debug   -> unit tests, Standard integration, reproducibility (bounds + NaN
#                init catch crashes/instabilities)
#   * release -> all integration cases, regression vs stored baseline
# If BOTH pass, the `sign` job marks the commit with a `hicar-full-test=success`
# commit status. The GPU lane reads that status to decide whether it can skip
# re-running this suite (see gpu.yml).
#
# The `example-namelists` job (push to develop only) reuses the release build's
# executable to regenerate helpers/example_namelists/*.nml and commit them back
# — it shares cpu-release's build instead of compiling HICAR a second time. It is
# a sibling of the test jobs (needs cpu-release for the exe, runs regardless of
# whether the tests pass) and does not affect `sign`. It targets develop (not
# main) because it pushes a commit directly, which main's PR-only ruleset blocks;
# main gets the refreshed namelists via the develop -> main PR.
#
# Triggers: every PR, push to main/develop, nightly, manual, and workflow_call
# (so gpu.yml can invoke it for an unsigned commit).
name: HICAR full-test (CPU)

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:
  workflow_call:

# statuses: write is needed by the sign job to mark the commit.
permissions:
  contents: read
  statuses: write

concurrency:
  group: fulltest-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- build-deps: compile the dependency toolchain once, then cache it -------
  # zlib / HDF5 / PnetCDF / netcdf-c / netcdf-fortran are built into ~/installdir
  # and cached under a key derived from the install script's contents. The test
  # jobs `needs:` this so the (expensive) source build happens once per cold
  # cache, instead of redundantly in cpu-debug and cpu-release in parallel. On a
  # warm cache this job restores ~/installdir and hicar_dependencies short-
  # circuits (see the sentinel check in hicar_install_utils.sh).
  build-deps:
    # De-duplicate push + pull_request runs. A push to main/develop already runs
    # this suite, and the `sign` job posts the `hicar-full-test` commit status that
    # main's ruleset requires on the head commit — so the pull_request event for a
    # same-repo develop->main (or main) PR would only re-test the identical, already
    # signed commit. Skip that case. cpu-debug / cpu-release / sign all `needs:`
    # build-deps, so they skip with it. Fork PRs (head in another repo) and PRs from
    # any other branch (e.g. a feature branch -> develop, which a push never tested)
    # still run normally.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name != github.repository ||
      !contains(fromJSON('["main", "develop"]'), github.head_ref)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/cache@v4
        with:
          path: ~/installdir
          # No restore-keys: a prefix fallback would restore an ~/installdir
          # built by an OLDER install script, and the sentinel in
          # hicar_dependencies would then skip rebuilding — silently using stale
          # deps. Keying purely on the script hash means exact hit => skip,
          # script changed => full miss => rebuild.
          key: hicar-deps-${{ runner.os }}-${{ hashFiles('.github/scripts/hicar_install_utils.sh') }}
      - run: bash .github/scripts/hicar_install_utils.sh hicar_dependencies

  # --- debug build: crash / instability / reproducibility ---------------------
  cpu-debug:
    needs: build-deps
    runs-on: ubuntu-22.04
    env:
      HICAR_MODE: debug
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/cache@v4
        with:
          path: ~/installdir
          # No restore-keys: a prefix fallback would restore an ~/installdir
          # built by an OLDER install script, and the sentinel in
          # hicar_dependencies would then skip rebuilding — silently using stale
          # deps. Keying purely on the script hash means exact hit => skip,
          # script changed => full miss => rebuild.
          key: hicar-deps-${{ runner.os }}-${{ hashFiles('.github/scripts/hicar_install_utils.sh') }}
      # build-deps has already populated ~/installdir, so this short-circuits
      # (apt packages + sentinel skip); it stays so LD_LIBRARY_PATH is persisted
      # to $GITHUB_ENV for the later steps that run the HICAR executable.
      - run: bash .github/scripts/hicar_install_utils.sh hicar_dependencies
      - run: bash .github/scripts/hicar_install_utils.sh hicar_install
      - run: bash .github/scripts/hicar_install_utils.sh gen_test_run_data
      # Cheapest failure first: exercises every CLI option of driver.F90
      # (exit codes + output) against the freshly built exe.
      - name: CLI options
        run: bash tests/test_cli_options.sh "$GITHUB_WORKSPACE"
      - name: Unit / invariant tests
        run: cd build && mpiexec -np 4 tests/HICAR-tester
      # Regenerate the example namelists from the gen_example_nmls/ scripts BEFORE
      # the integration tests, so the cases validate the CURRENT gen scripts rather
      # than a possibly stale committed .nml (see cpu-debug). Release build installs
      # bin/HICAR.
      - name: Regenerate example namelists (integration uses current gen scripts)
        run: bash helpers/example_namelists/generate_examples.sh "$GITHUB_WORKSPACE/bin/HICAR_debug"
      - name: Reproducibility (decomposition + restart)
        run: bash tests/test_reproducibility.sh "$GITHUB_WORKSPACE" all
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cpu-debug-diagnostics
          path: |
            tests/Test_Cases/input/*.err
            tests/figures/**
          if-no-files-found: ignore

  # --- release build: full config matrix + regression ------------------------
  cpu-release:
    needs: build-deps
    runs-on: ubuntu-22.04
    env:
      HICAR_MODE: release
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/cache@v4
        with:
          path: ~/installdir
          # No restore-keys: a prefix fallback would restore an ~/installdir
          # built by an OLDER install script, and the sentinel in
          # hicar_dependencies would then skip rebuilding — silently using stale
          # deps. Keying purely on the script hash means exact hit => skip,
          # script changed => full miss => rebuild.
          key: hicar-deps-${{ runner.os }}-${{ hashFiles('.github/scripts/hicar_install_utils.sh') }}
      # build-deps has already populated ~/installdir, so this short-circuits
      # (apt packages + sentinel skip); it stays so LD_LIBRARY_PATH is persisted
      # to $GITHUB_ENV for the later steps that run the HICAR executable.
      - run: bash .github/scripts/hicar_install_utils.sh hicar_dependencies
      - run: bash .github/scripts/hicar_install_utils.sh hicar_install
      - run: bash .github/scripts/hicar_install_utils.sh gen_test_run_data
      # Regenerate the example namelists from the gen_example_nmls/ scripts BEFORE
      # the integration tests, so the cases validate the CURRENT gen scripts rather
      # than a possibly stale committed .nml (see cpu-debug). Release build installs
      # bin/HICAR.
      - name: Regenerate example namelists (integration uses current gen scripts)
        run: bash helpers/example_namelists/generate_examples.sh "$GITHUB_WORKSPACE/bin/HICAR"
      # Publish the namelists regenerated HERE (on the build runner, where the
      # -march=native release exe runs correctly) so the example-namelists job can
      # commit them WITHOUT re-running the binary on a different runner — a
      # native-tuned exe SIGILLs on a runner whose CPU lacks an instruction the
      # builder emitted. Uploaded before the integration tests so it is available
      # even if a later test step fails.
      - name: Upload regenerated example namelists (shared with example-namelists)
        uses: actions/upload-artifact@v4
        with:
          name: regenerated-namelists
          path: helpers/example_namelists/*.nml
          if-no-files-found: error
      - name: Integration (all config cases — run only)
        run: |
          cd tests/Test_Cases
          bash test_case_runner.sh "$GITHUB_WORKSPACE" \
            "Standard,Standard_restart,Nested,Nested_restart"
      # Resolve the regression reference: the most recent ancestor of this commit
      # carrying a hicar-regression-blessed=success status (no stored file).
      - name: Resolve blessed regression commit
        id: blessed
        continue-on-error: true   # no blessed commit yet -> regression step is skipped/soft
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha=$(bash tests/resolve_blessed_commit.sh "$GITHUB_WORKSPACE" --exclude-head)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "blessed regression commit: $sha"
      # Cache the recompiled blessed exe so it's rebuilt only when the blessed
      # commit changes, not on every run.
      - name: Cache blessed regression exe
        if: steps.blessed.outputs.sha != ''
        uses: actions/cache@v4
        with:
          path: |
            bin/HICAR_blessed
            bin/.regression_hash
          key: regression-exe-${{ runner.os }}-${{ steps.blessed.outputs.sha }}
      - name: Regression vs blessed commit (recompiles blessed exe, diffs outputs)
        if: steps.blessed.outputs.sha != ''
        continue-on-error: true   # flip to false once a blessed commit is established
        run: |
          bash tests/test_regression.sh "$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/build" \
            "Standard,Nested" --blessed-commit "${{ steps.blessed.outputs.sha }}" --mode exact
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cpu-release-diagnostics
          path: |
            tests/regression_report_*.json
            tests/figures/**
          if-no-files-found: ignore

  # --- sign: mark the commit as having passed full-test ----------------------
  sign:
    needs: [cpu-debug, cpu-release]
    runs-on: ubuntu-22.04
    permissions:
      statuses: write
    steps:
      - name: Sign commit (hicar-full-test = success)
        env:
          GH_TOKEN: ${{ github.token }}
          # On a pull_request event github.sha is the ephemeral merge commit, but
          # branch-ruleset required status checks are evaluated on the PR HEAD
          # commit — so post there for PRs (falls back to github.sha for pushes,
          # which is what the GPU lane's signed-commit skip logic reads).
          SIGN_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          gh api -X POST "/repos/${{ github.repository }}/statuses/${SIGN_SHA}" \
            -f state=success \
            -f context=hicar-full-test \
            -f description="Passed HICAR full-test (CPU debug + release)" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "Signed ${SIGN_SHA} as hicar-full-test=success"

  # --- example namelists: commit the regenerated namelists (push to develop only) ---
  # Reuses the example namelists cpu-release regenerated on ITS OWN runner (the
  # `regenerated-namelists` artifact). It does NOT re-run the release exe here:
  # that exe is built with -march=native and SIGILLs when run on a runner whose CPU
  # differs from the builder's. Runs regardless of whether the test jobs passed —
  # it only needs cpu-release to have produced the artifact — so it is independent
  # of the correctness gate and never blocks or is blocked by `sign`. Skipped on
  # PRs (it commits back).
  example-namelists:
    needs: cpu-release
    # push to develop ONLY, AND only in the direct full-test run. develop (not
    # main) because main is PR-protected — this job pushes a commit directly, and
    # a direct push to main is rejected by the branch ruleset. main receives the
    # refreshed namelists when develop is merged into it via PR. The github.workflow
    # guard stops the regenerate/commit running twice when gpu.yml reuses this
    # workflow via workflow_call (there github.workflow is the CALLER's name).
    if: ${{ always() && github.event_name == 'push' && github.ref_name == 'develop' && github.workflow == 'HICAR full-test (CPU)' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write   # commit the regenerated namelists back to the branch
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      # Reuse the .nml files cpu-release already regenerated on its own runner.
      # We deliberately do NOT download/run the release exe here: it is built with
      # -march=native and SIGILLs on a runner whose CPU differs from the builder's.
      # Downloading the generated text files needs no deps cache, runtime libs, or
      # binary execution.
      - name: Download regenerated example namelists
        id: dl
        continue-on-error: true   # absent if cpu-release failed before regen -> skip
        uses: actions/download-artifact@v4
        with:
          name: regenerated-namelists
          path: helpers/example_namelists

      - name: Commit regenerated namelists (if changed)
        if: steps.dl.outcome == 'success'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- helpers/example_namelists/; then
            echo "Example namelists already up to date — nothing to commit."
            exit 0
          fi
          git add helpers/example_namelists/*.nml
          git commit -m "ci: regenerate example namelists [skip ci]"
          git pull --rebase origin "${{ github.ref_name }}" || true
          git push origin "HEAD:${{ github.ref_name }}"
