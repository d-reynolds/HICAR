# Maintainer-only: bless a commit as the regression reference.
#
# The regression reference is the most recent commit carrying a
# `hicar-regression-blessed=success` commit status (the regression test recompiles
# that commit to regenerate the reference output — see tests/test_regression.sh).
# Blessing is therefore just posting that status — no file, no PR, no build, no LFS.
# Same machinery as the `hicar-full-test` sign in hicar-full-test.yml.
#
# Bless a commit that has passed hicar-full-test (the job warns if it hasn't).
name: Bless regression commit

on:
  workflow_dispatch:
    inputs:
      commit:
        description: Commit SHA to bless (blank = current default-branch HEAD)
        type: string
        required: false
      reason:
        description: Why the regression reference is changing (for the audit log)
        type: string
        required: true

permissions:
  contents: read
  statuses: write

jobs:
  bless:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bless commit (hicar-regression-blessed = success)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha="${{ inputs.commit }}"
          [ -z "$sha" ] && sha=$(git rev-parse HEAD)
          sha=$(git rev-parse "$sha")

          # Warn (do not block) if the commit hasn't passed the full-test gate.
          ft=$(gh api "/repos/${{ github.repository }}/commits/$sha/status" \
                 --jq '[.statuses[] | select(.context=="hicar-full-test")][0].state // "none"')
          echo "hicar-full-test status of $sha: $ft"
          [ "$ft" = "success" ] || echo "::warning::Blessing $sha which has NOT passed hicar-full-test (status=$ft)"

          gh api -X POST "/repos/${{ github.repository }}/statuses/$sha" \
            -f state=success \
            -f context=hicar-regression-blessed \
            -f description="Regression reference — ${{ inputs.reason }}" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "Blessed $sha as hicar-regression-blessed=success"
