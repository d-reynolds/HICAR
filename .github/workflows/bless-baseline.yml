# Maintainer-only: bless a commit as the regression reference.
#
# The regression reference is the most recent commit carrying a
# hicar-regression-blessed=success status (test_regression.sh recompiles it to
# regenerate the reference output). Blessing is just posting that status — no
# file, no build. Bless a commit that has passed hicar-full-test (warns if not).
name: Bless regression commit

on:
  workflow_dispatch:
    inputs:
      commit:
        description: Commit SHA to bless (blank = current default-branch HEAD)
        type: string
        required: false
      reason:
        description: Why the regression reference is changing (for the audit log)
        type: string
        required: true

permissions:
  contents: read
  statuses: write

jobs:
  bless:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Resolve commit (warn if not full-tested)
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha="${{ inputs.commit }}"
          [ -z "$sha" ] && sha=$(git rev-parse HEAD)
          sha=$(git rev-parse "$sha")

          # Warn (do not block) if the commit hasn't passed the full-test gate.
          ft=$(gh api "/repos/${{ github.repository }}/commits/$sha/status" \
                 --jq '[.statuses[] | select(.context=="hicar-full-test")][0].state // "none"')
          echo "hicar-full-test status of $sha: $ft"
          [ "$ft" = "success" ] || echo "::warning::Blessing $sha which has NOT passed hicar-full-test (status=$ft)"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
      - uses: ./.github/actions/sign-commit
        with:
          sha: ${{ steps.resolve.outputs.sha }}
          context: hicar-regression-blessed
          description: Regression reference — ${{ inputs.reason }}
          token: ${{ github.token }}
