# Fast per-PR gate: GitHub-hosted, GNU/CPU only (hosted runners have no GPU/NVFortran).
# Tier 1-2 of the test pyramid: build matrix -> unit/invariant tests -> CPU smoke
# -> CPU bit-for-bit regression vs a stored baseline.
#
# The GPU/NVFortran lane lives in gpu.yml (self-hosted, label/nightly).
name: PR CI (GNU / CPU)

on:
  pull_request:
    branches: [master, develop]
  push:
    branches: [master, develop]
  workflow_dispatch:

# Cancel superseded runs on the same ref to save runner time.
concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    # Pinned image: CPU bit-for-bit regression assumes a fixed gnu toolchain.
    # Bumping this image requires re-blessing the cpu-gnu-* baselines.
    runs-on: ubuntu-22.04
    permissions:
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        build_type: [debug, release]
    env:
      HICAR_MODE: ${{ matrix.build_type }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/installdir
          key: hicar-deps-${{ runner.os }}-${{ hashFiles('.github/scripts/hicar_install_utils.sh') }}
          restore-keys: hicar-deps-${{ runner.os }}-

      - name: Build dependencies
        run: bash .github/scripts/hicar_install_utils.sh hicar_dependencies

      - name: Build HICAR (${{ matrix.build_type }})
        run: bash .github/scripts/hicar_install_utils.sh hicar_install

      - name: Build test executable + fetch test data
        run: bash .github/scripts/hicar_install_utils.sh gen_test_run_data

      # --- Tier 1: localized correctness -----------------------------------
      - name: CLI options tests
        run: bash tests/test_cli_options.sh "$GITHUB_WORKSPACE"

      - name: Unit / invariant tests
        run: cd build && mpiexec -np 4 tests/HICAR-tester

      # --- Tier 2: end-to-end shake-out + regression -----------------------
      - name: Integration (Standard case)
        run: |
          cd tests/Test_Cases
          bash test_case_runner.sh "$GITHUB_WORKSPACE" Standard

      - name: CPU bit-for-bit regression vs baseline
        # continue-on-error until the cpu-gnu-* baselines have been blessed once
        # via the bless-baseline workflow. Flip to false to make it a required gate.
        continue-on-error: true
        run: |
          bash tests/regression_vs_baseline.sh "$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/build" \
            --lane "cpu-gnu-${{ matrix.build_type }}" --mode exact

      - name: Upload regression diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-${{ matrix.build_type }}
          path: |
            tests/regression_report_*.json
            tests/figures/regression/**
          if-no-files-found: ignore
