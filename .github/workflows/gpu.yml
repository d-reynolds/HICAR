# GPU test suite (NVFortran, self-hosted).
#
# SECURITY: the self-hosted GPU runner never runs untrusted PR code — triggers are
# only the nightly schedule (run on main) and manual dispatch, no push/pull_request.
# develop is GPU-tested by the nightly after it merges to main.
#
# FLOW:
#   0. changed       — nightly only: skip if main is unchanged since the last run.
#   1. check-signed  — is this commit hicar-full-test=success (the CPU gate)?
#   2. full-test     — if not signed, run the CPU full-test (reusable workflow).
#   3. gpu-tests     — build CPU-ref (OPENACC=OFF) + GPU (OPENACC=ON) exes with the
#                      same NVHPC compiler, run both on Standard, compare by tolerance.
#   4. sign-gpu      — on success, post gpu-check=success (required by main's ruleset).
name: GPU test suite (NVFortran)

on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  actions: read     # the `changed` gate queries previous runs
  statuses: write   # read the CPU gate; a reused full-test signs

concurrency:
  group: gpu-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 0. On a nightly, skip if main is unchanged since the last completed run.
  #    Manual dispatch always runs.
  changed:
    runs-on: ubuntu-22.04
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Event '${{ github.event_name }}' is a manual/explicit trigger — running."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Most recent completed run of this workflow on main (this in-progress
          # run is not 'completed', so it is naturally excluded). On any API
          # error, fall back to an empty value so we run rather than silently
          # skip the nightly.
          last_sha=$(gh api \
            "/repos/${{ github.repository }}/actions/workflows/gpu.yml/runs?branch=main&status=completed&per_page=1&exclude_pull_requests=true" \
            --jq '.workflow_runs[0].head_sha // ""') || last_sha=""
          cur_sha="${{ github.sha }}"
          echo "current main SHA:      $cur_sha"
          echo "last GPU-run main SHA: ${last_sha:-<none>}"
          if [ -z "$last_sha" ]; then
            echo "No previous GPU run found — running."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [ "$last_sha" = "$cur_sha" ]; then
            echo "main unchanged since the last GPU run — skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "main advanced since the last GPU run — running."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  # 1. Has this commit passed the CPU full-test gate?
  check-signed:
    needs: changed
    if: needs.changed.outputs.should_run == 'true'
    runs-on: ubuntu-22.04
    outputs:
      signed: ${{ steps.check.outputs.signed }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          state=$(gh api "/repos/${{ github.repository }}/commits/${{ github.sha }}/status" \
                    --jq '[.statuses[] | select(.context=="hicar-full-test")][0].state // "none"')
          echo "hicar-full-test status for ${{ github.sha }}: $state"
          if [ "$state" = "success" ]; then
            echo "signed=true"  >> "$GITHUB_OUTPUT"
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
          fi

  # 2. Run the CPU full-test only if this commit isn't already signed.
  full-test:
    needs: check-signed
    if: needs.check-signed.outputs.signed != 'true'
    permissions:
      contents: write
      statuses: write
    uses: ./.github/workflows/hicar-full-test.yml

  # 3. GPU build + GPU-vs-CPU regression + validation.
  gpu-tests:
    needs: [check-signed, full-test]
    # Run when already signed (full-test skipped) OR the full-test we ran passed.
    if: >
      always() &&
      needs.check-signed.result == 'success' &&
      (needs.check-signed.outputs.signed == 'true' || needs.full-test.result == 'success')
    runs-on: [self-hosted, gpu, nvhpc]
    env:
      FC: nvfortran
      CC: nvc
      CXX: nvc++
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: ./.github/actions/snowpack-src-cache   # outage fallback for the git.wsl.ch fetch (survives rm -rf build_*)
      - name: Show GPU / toolchain
        run: |
          nvidia-smi -L
          nvfortran --version | head -n2
      # CPU reference: NVHPC, OPENACC=OFF. Only the HICAR target (skip the device link).
      - name: Build CPU reference exe (NVHPC, OPENACC=OFF)
        run: |
          rm -rf build_cpu
          cmake -S . -B build_cpu -DMODE=release -DOPENACC=OFF
          cmake --build build_cpu --target HICAR -j"$(nproc)"
          cmake --install build_cpu
      - name: Build GPU exe (NVHPC, OPENACC=ON) + test data
        run: |
          rm -rf build_gpu
          cmake -S . -B build_gpu -DMODE=release -DOPENACC=ON
          cmake --build build_gpu --target HICAR -j"$(nproc)"
          cmake --install build_gpu
          cmake --build build_gpu --target download_test_data
      - name: GPU-vs-CPU regression (tolerance)
        continue-on-error: true   # flip to false once the comparison is stable
        run: |
          bash tests/compare_cpu_gpu.sh "$GITHUB_WORKSPACE" \
            "$GITHUB_WORKSPACE/bin/HICAR" "$GITHUB_WORKSPACE/bin/HICAR_gpu"
      - name: Validation (stub)
        run: |
          echo "TODO: GPU validation — idealized analytic case and/or conservation diagnostics."
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gpu-diagnostics
          path: |
            tests/gpu_cpu_report.json
            tests/figures/**
          if-no-files-found: ignore

  # 4. Post gpu-check=success (required by main's ruleset). No pull_request trigger,
  #    so the SHA resolves to github.sha — the dispatched branch HEAD (= PR head).
  #    Runs on a GitHub-hosted runner, not the GPU box.
  sign-gpu:
    needs: gpu-tests
    if: needs.gpu-tests.result == 'success'
    runs-on: ubuntu-22.04
    permissions:
      statuses: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/sign-commit
        with:
          sha: ${{ github.event.pull_request.head.sha || github.sha }}
          context: gpu-check
          description: Passed GPU test suite (NVHPC build + GPU-vs-CPU run)
          token: ${{ github.token }}
