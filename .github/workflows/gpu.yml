# GPU test suite (NVFortran, self-hosted).
#
# SECURITY POSTURE: the self-hosted runner NEVER runs untrusted PR code. Triggers
# are only the nightly schedule (which GitHub runs on the default branch, main)
# and manual dispatch — no push and no pull_request trigger (so a fork PR can
# never execute on the GPU box). develop is GPU-tested by the nightly after it
# merges to main, not on the open develop -> main PR.
#
# FLOW:
#   0. changed       — nightly only: skip the whole run if main has not advanced
#                      since the last GPU workflow run (manual dispatch always
#                      runs). Avoids re-testing an unchanged main every night.
#   1. check-signed  — is this commit marked hicar-full-test=success (CPU gate)?
#   2. full-test     — if NOT signed, run the CPU full-test suite (reusable
#                      workflow). If it fails, the GPU job does not run.
#   3. gpu-tests     — build a CPU-reference exe (NVHPC, OPENACC=OFF) and a GPU
#                      exe (NVHPC, OPENACC=ON) from this commit, run both on the
#                      Standard case, and compare GPU-vs-CPU by tolerance. Same
#                      compiler for both isolates the GPU port. Then validation.
#   4. sign-gpu      — on gpu-tests success, post the gpu-check=success commit
#                      status that main's ruleset requires before a PR can merge.
name: GPU test suite (NVFortran)

on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  actions: read     # query previous runs of this workflow (the "changed" gate)
  statuses: write   # read to check the gate; write so a reused full-test can sign

concurrency:
  group: gpu-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- 0. Skip the nightly when main hasn't moved since the last GPU run -------
  # The nightly schedule fires every day even if nothing merged. Compare the
  # commit under test against the head SHA of the most recent *completed* run of
  # this same workflow on main; if they're identical, main was already
  # GPU-tested at that SHA, so we skip. Manual dispatch always runs.
  changed:
    runs-on: ubuntu-22.04
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Event '${{ github.event_name }}' is a manual/explicit trigger — running."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Most recent completed run of this workflow on main (this in-progress
          # run is not 'completed', so it is naturally excluded). On any API
          # error, fall back to an empty value so we run rather than silently
          # skip the nightly.
          last_sha=$(gh api \
            "/repos/${{ github.repository }}/actions/workflows/gpu.yml/runs?branch=main&status=completed&per_page=1&exclude_pull_requests=true" \
            --jq '.workflow_runs[0].head_sha // ""') || last_sha=""
          cur_sha="${{ github.sha }}"
          echo "current main SHA:      $cur_sha"
          echo "last GPU-run main SHA: ${last_sha:-<none>}"
          if [ -z "$last_sha" ]; then
            echo "No previous GPU run found — running."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [ "$last_sha" = "$cur_sha" ]; then
            echo "main unchanged since the last GPU run — skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "main advanced since the last GPU run — running."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  # --- 1. Has this commit passed the CPU full-test gate? ----------------------
  check-signed:
    needs: changed
    if: needs.changed.outputs.should_run == 'true'
    runs-on: ubuntu-22.04
    outputs:
      signed: ${{ steps.check.outputs.signed }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          state=$(gh api "/repos/${{ github.repository }}/commits/${{ github.sha }}/status" \
                    --jq '[.statuses[] | select(.context=="hicar-full-test")][0].state // "none"')
          echo "hicar-full-test status for ${{ github.sha }}: $state"
          if [ "$state" = "success" ]; then
            echo "signed=true"  >> "$GITHUB_OUTPUT"
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
          fi

  # --- 2. Run the CPU full-test only if the commit isn't already signed -------
  full-test:
    needs: check-signed
    if: needs.check-signed.outputs.signed != 'true'
    permissions:
      contents: write
      statuses: write
    uses: ./.github/workflows/hicar-full-test.yml

  # --- 3. GPU build + GPU-vs-CPU regression + validation ----------------------
  gpu-tests:
    needs: [check-signed, full-test]
    # Run when the commit was already signed, OR the full-test we just ran passed.
    # (When signed, the full-test job is skipped, so guard with always()+result.)
    if: >
      always() &&
      needs.check-signed.result == 'success' &&
      (needs.check-signed.outputs.signed == 'true' || needs.full-test.result == 'success')
    runs-on: [self-hosted, gpu, nvhpc]
    env:
      FC: nvfortran
      CC: nvc
      CXX: nvc++
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Show GPU / toolchain
        run: |
          nvidia-smi -L
          nvfortran --version | head -n2

      # CPU reference: NVHPC, host (OPENACC=OFF). Build ONLY the HICAR target
      # (not HICAR-tester) to avoid an unnecessary device link.
      - name: Build CPU reference exe (NVHPC, OPENACC=OFF)
        run: |
          rm -rf build_cpu
          cmake -S . -B build_cpu -DMODE=release -DOPENACC=OFF
          cmake --build build_cpu --target HICAR -j"$(nproc)"
          cmake --install build_cpu

      # GPU build: NVHPC, OpenACC. Build the HICAR target + fetch test data.
      - name: Build GPU exe (NVHPC, OPENACC=ON) + test data
        run: |
          rm -rf build_gpu
          cmake -S . -B build_gpu -DMODE=release -DOPENACC=ON
          cmake --build build_gpu --target HICAR -j"$(nproc)"
          cmake --install build_gpu
          cmake --build build_gpu --target download_test_data

      - name: GPU-vs-CPU regression (tolerance)
        continue-on-error: true   # flip to false once the comparison is stable
        run: |
          bash tests/compare_cpu_gpu.sh "$GITHUB_WORKSPACE" \
            "$GITHUB_WORKSPACE/bin/HICAR" "$GITHUB_WORKSPACE/bin/HICAR_gpu"

      - name: Validation (stub)
        run: |
          echo "TODO: GPU validation — idealized analytic case and/or conservation"
          echo "diagnostics on the regression run. Stubbed for this iteration."

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gpu-diagnostics
          path: |
            tests/gpu_cpu_report.json
            tests/figures/**
          if-no-files-found: ignore

  # --- 4. Sign the commit as having passed the GPU check ----------------------
  # Posts the `gpu-check` commit status that main's ruleset requires before a PR
  # can merge. Per the chosen policy, the GPU-vs-CPU comparison stays advisory
  # (continue-on-error above), so this signs on a successful NVHPC BUILD + RUN of
  # both exes. To gate a PR, manually dispatch this workflow on the PR head branch
  # (develop): github.sha is then the PR head commit, so the status lands where
  # main's ruleset evaluates it. Runs on a GitHub-hosted runner (not the GPU box),
  # which just calls the status API.
  sign-gpu:
    needs: gpu-tests
    if: needs.gpu-tests.result == 'success'
    runs-on: ubuntu-22.04
    permissions:
      statuses: write
    steps:
      - name: Sign commit (gpu-check = success)
        env:
          GH_TOKEN: ${{ github.token }}
          # No pull_request trigger on this workflow, so this resolves to
          # github.sha — the branch HEAD the run was dispatched on (= PR head).
          SIGN_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          gh api -X POST "/repos/${{ github.repository }}/statuses/${SIGN_SHA}" \
            -f state=success \
            -f context=gpu-check \
            -f description="Passed GPU test suite (NVHPC build + GPU-vs-CPU run)" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "Signed ${SIGN_SHA} as gpu-check=success"
