# GPU test suite (NVFortran, self-hosted).
#
# SECURITY POSTURE unchanged: the self-hosted runner NEVER runs untrusted PR code.
# Triggers are only push to master/develop, nightly, and manual dispatch — no
# pull_request trigger.
#
# FLOW:
#   1. check-signed  — is this commit marked hicar-full-test=success (CPU gate)?
#   2. full-test     — if NOT signed, run the CPU full-test suite (reusable
#                      workflow). If it fails, the GPU job does not run.
#   3. gpu-tests     — build a CPU-reference exe (NVHPC, OPENACC=OFF) and a GPU
#                      exe (NVHPC, OPENACC=ON) from this commit, run both on the
#                      Standard case, and compare GPU-vs-CPU by tolerance. Same
#                      compiler for both isolates the GPU port. Then validation.
name: GPU test suite (NVFortran)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master, develop]
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC — after the CPU full-test nightly (02:00)
  workflow_dispatch:

permissions:
  contents: read
  statuses: write   # read to check the gate; write so a reused full-test can sign

concurrency:
  group: gpu-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- 1. Has this commit passed the CPU full-test gate? ----------------------
  check-signed:
    runs-on: ubuntu-22.04
    outputs:
      signed: ${{ steps.check.outputs.signed }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          state=$(gh api "/repos/${{ github.repository }}/commits/${{ github.sha }}/status" \
                    --jq '[.statuses[] | select(.context=="hicar-full-test")][0].state // "none"')
          echo "hicar-full-test status for ${{ github.sha }}: $state"
          if [ "$state" = "success" ]; then
            echo "signed=true"  >> "$GITHUB_OUTPUT"
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
          fi

  # --- 2. Run the CPU full-test only if the commit isn't already signed -------
  full-test:
    needs: check-signed
    if: needs.check-signed.outputs.signed != 'true'
    permissions:
      contents: read
      statuses: write
    uses: ./.github/workflows/hicar-full-test.yml

  # --- 3. GPU build + GPU-vs-CPU regression + validation ----------------------
  gpu-tests:
    needs: [check-signed, full-test]
    # Run when the commit was already signed, OR the full-test we just ran passed.
    # (When signed, the full-test job is skipped, so guard with always()+result.)
    if: >
      always() &&
      needs.check-signed.result == 'success' &&
      (needs.check-signed.outputs.signed == 'true' || needs.full-test.result == 'success')
    runs-on: [self-hosted, gpu, nvhpc]
    env:
      FC: nvfortran
      CC: nvc
      CXX: nvc++
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Show GPU / toolchain
        run: |
          nvidia-smi -L
          nvfortran --version | head -n2

      # CPU reference: NVHPC, host (OPENACC=OFF). Build ONLY the HICAR target
      # (not HICAR-tester) to avoid an unnecessary device link.
      - name: Build CPU reference exe (NVHPC, OPENACC=OFF)
        run: |
          rm -rf build_cpu
          cmake -S . -B build_cpu -DFSM=OFF -DMODE=release -DOPENACC=OFF
          cmake --build build_cpu --target HICAR -j"$(nproc)"
          cmake --install build_cpu

      # GPU build: NVHPC, OpenACC. Build the HICAR target + fetch test data.
      - name: Build GPU exe (NVHPC, OPENACC=ON) + test data
        run: |
          rm -rf build_gpu
          cmake -S . -B build_gpu -DFSM=OFF -DMODE=release -DOPENACC=ON
          cmake --build build_gpu --target HICAR -j"$(nproc)"
          cmake --install build_gpu
          cmake --build build_gpu --target download_test_data

      - name: GPU-vs-CPU regression (tolerance)
        continue-on-error: true   # flip to false once the comparison is stable
        run: |
          bash tests/compare_cpu_gpu.sh "$GITHUB_WORKSPACE" \
            "$GITHUB_WORKSPACE/bin/HICAR" "$GITHUB_WORKSPACE/bin/HICAR_gpu"

      - name: Validation (stub)
        run: |
          echo "TODO: GPU validation — idealized analytic case and/or conservation"
          echo "diagnostics on the regression run. Stubbed for this iteration."

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gpu-diagnostics
          path: |
            tests/gpu_cpu_report.json
            tests/figures/**
          if-no-files-found: ignore
