# GPU test suite (NVFortran, self-hosted).
#
# SECURITY: the self-hosted GPU runner is NEVER triggered automatically by push or
# pull_request — otherwise anyone with write access could put code on a branch, open
# a PR (or have it run post-merge), and execute it on the box. It runs ONLY on manual
# workflow_dispatch by an org maintainer.
# To make the required gpu-check pass on a PR into main, a maintainer reviews the PR
# and dispatches this workflow on the PR's HEAD branch
# (`gh workflow run gpu.yml --ref <head>`); sign-gpu then posts gpu-check=success on
# github.sha (= the PR head), which is where main's ruleset evaluates it.
#
# FLOW (the GPU lane runs independently — it neither gates on nor invokes full-test):
#   1. gpu-tests     — build CPU-ref (OPENACC=OFF) + GPU (OPENACC=ON) exes with the
#                      same NVHPC compiler, run both on Standard, compare by tolerance.
#   2. sign-gpu      — on success, post gpu-check=success (required by main's ruleset).
name: GPU test suite (NVFortran)

on:
  workflow_dispatch:

permissions:
  contents: read    # checkout (sign-gpu posts its status with its own statuses: write)

concurrency:
  group: gpu-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gpu-tests:
    runs-on: [self-hosted, gpu, nvhpc]
    env:
      FC: nvfortran
      CC: nvc
      CXX: nvc++
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: ./.github/actions/snowpack-src-cache   # outage fallback for the git.wsl.ch fetch (survives rm -rf build_*)
      - name: Show GPU / toolchain
        run: |
          nvidia-smi -L
          nvfortran --version | head -n2
      - name: Build CPU reference exe (NVHPC, OPENACC=OFF)
        run: |
          rm -rf build_gpu_compare_cpu
          cmake -S . -B build_gpu_compare_cpu -DMODE=release -DOPENACC=OFF
          cmake --build build_gpu_compare_cpu --target HICAR -j"$(nproc)"
      - name: Build GPU exe (NVHPC, OPENACC=ON)
        run: |
          rm -rf build_gpu_compare_gpu
          cmake -S . -B build_gpu_compare_gpu -DMODE=release -DOPENACC=ON
          cmake --build build_gpu_compare_gpu --target HICAR -j"$(nproc)"
      - name: GPU-vs-CPU regression (tolerance)
        continue-on-error: true   # flip to false once the comparison is stable
        run: make -C build_gpu_compare_gpu test_gpu
      - name: Validation (stub)
        run: |
          echo "TODO: GPU validation — idealized analytic case and/or conservation diagnostics."
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gpu-diagnostics
          path: |
            tests/gpu_cpu_report.json
            tests/figures/**
          if-no-files-found: ignore

  sign-gpu:
    needs: gpu-tests
    if: needs.gpu-tests.result == 'success'
    runs-on: ubuntu-22.04
    permissions:
      statuses: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/sign-commit
        with:
          sha: ${{ github.event.pull_request.head.sha || github.sha }}
          context: gpu-check
          description: Passed GPU test suite (NVHPC build + GPU-vs-CPU run)
          token: ${{ github.token }}
