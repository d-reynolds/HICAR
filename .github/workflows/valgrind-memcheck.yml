# Nightly valgrind memcheck of the HICAR unit-test suite (CPU debug build).
#
# WHY THIS EXISTS: the normal test run plus the debug build's -finit-* flags do
# NOT catch every uninitialised-memory bug. gfortran's -finit-real/-integer/
# -logical only poison LOCAL/stack variables — they do NOT initialise heap /
# allocatable memory. An uninitialised `logical` component of an *allocatable*
# options object therefore passed every local test (reading garbage-false) yet
# failed deterministically on the CI amd64 runner (reading garbage-true). Only
# valgrind --track-origins reliably detects that class in Fortran (gfortran has
# no MemorySanitizer), which is why this lane is worth keeping.
#
# SCOPE / COST: CPU debug build, HICAR-tester only. Integration cases are far
# too slow under valgrind, and the GPU/OpenACC build can't run under valgrind at
# all. Runs nightly, on manual dispatch, and automatically after the CPU
# full-test passes on a commit that has an open PR to main. That last lane posts
# the `valgrind` commit status that main's ruleset REQUIRES before a PR can merge
# (sign-valgrind below). valgrind is ~10-50x slower than native, so it sits
# behind the full-test gate rather than running on every push.
name: Valgrind memcheck (nightly)

on:
  # Auto-run after the CPU full-test completes; the `changed` gate below filters
  # to a successful full-test on a commit that has an open PR to main.
  workflow_run:
    workflows: ["HICAR full-test (CPU)"]
    types: [completed]
  schedule:
    - cron: '30 3 * * *'   # 03:30 UTC nightly
  workflow_dispatch:

permissions:
  contents: read
  actions: read         # query previous runs of this workflow (the "changed" gate)
  pull-requests: read   # detect an open PR to main (workflow_run lane)

concurrency:
  # Per-commit for the workflow_run lane (don't let a newer develop push cancel an
  # in-flight valgrind for a different commit); per-ref otherwise.
  group: valgrind-${{ github.event.workflow_run.head_sha || github.ref }}
  cancel-in-progress: true

jobs:
  # --- Skip the nightly when main hasn't moved since the last run -------------
  # The schedule fires daily even if nothing merged. Compare the commit under
  # test against the head SHA of the most recent completed run of this workflow
  # on main; identical => main was already checked at that SHA, so skip. Manual
  # dispatch always runs.
  changed:
    runs-on: ubuntu-22.04
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      head_sha: ${{ steps.check.outputs.head_sha }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          event="${{ github.event_name }}"

          # SHA the memcheck job should check out: the commit the full-test ran on
          # for the workflow_run lane, otherwise this run's branch HEAD.
          echo "head_sha=${{ github.event.workflow_run.head_sha || github.sha }}" >> "$GITHUB_OUTPUT"

          # --- workflow_run lane: only a PASSED full-test on an open main PR ---
          if [ "$event" = "workflow_run" ]; then
            concl="${{ github.event.workflow_run.conclusion }}"
            head_branch="${{ github.event.workflow_run.head_branch }}"
            echo "full-test conclusion=$concl head=$head_branch"
            if [ "$concl" != "success" ]; then
              echo "full-test did not pass — skipping valgrind."
              echo "should_run=false" >> "$GITHUB_OUTPUT"; exit 0
            fi
            n=$(gh pr list --repo "${{ github.repository }}" \
                  --base main --head "$head_branch" --state open \
                  --json number --jq 'length' 2>/dev/null || echo 0)
            if [ "${n:-0}" -ge 1 ]; then
              echo "open PR to main for '$head_branch' — running valgrind."
              echo "should_run=true" >> "$GITHUB_OUTPUT"
            else
              echo "no open PR to main for '$head_branch' — skipping."
              echo "should_run=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          if [ "$event" != "schedule" ]; then
            echo "Event '$event' is a manual/explicit trigger — running."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # On any API error, fall back to empty so we run rather than skip.
          last_sha=$(gh api \
            "/repos/${{ github.repository }}/actions/workflows/valgrind-memcheck.yml/runs?branch=main&status=completed&per_page=1&exclude_pull_requests=true" \
            --jq '.workflow_runs[0].head_sha // ""') || last_sha=""
          cur_sha="${{ github.sha }}"
          echo "current main SHA:  $cur_sha"
          echo "last run main SHA: ${last_sha:-<none>}"
          if [ -z "$last_sha" ]; then
            echo "No previous run found — running."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [ "$last_sha" = "$cur_sha" ]; then
            echo "main unchanged since the last run — skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "main advanced since the last run — running."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  memcheck:
    needs: changed
    if: needs.changed.outputs.should_run == 'true'
    runs-on: ubuntu-22.04
    env:
      HICAR_MODE: debug
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # workflow_run defaults to main's HEAD; check out the commit the
          # full-test actually ran on (a no-op for schedule/manual runs).
          ref: ${{ needs.changed.outputs.head_sha }}

      # Same cache key as hicar-full-test's build-deps, so this restores the
      # already-built ~/installdir toolchain instead of rebuilding netcdf/hdf5.
      - uses: actions/cache@v4
        with:
          path: ~/installdir
          key: hicar-deps-${{ runner.os }}-${{ hashFiles('.github/scripts/hicar_install_utils.sh') }}
          restore-keys: hicar-deps-${{ runner.os }}-

      - run: bash .github/scripts/hicar_install_utils.sh hicar_dependencies
      - run: bash .github/scripts/hicar_install_utils.sh hicar_install
      - run: bash .github/scripts/hicar_install_utils.sh gen_test_run_data

      - name: Install valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind

      - name: Memcheck unit tests (mpiexec -np 4)
        run: |
          export LD_LIBRARY_PATH="$HOME/installdir/lib:$LD_LIBRARY_PATH"
          cd build
          # Disable the runner's default -e/-o pipefail so we can capture the
          # tester's own exit code and post-process the valgrind log ourselves.
          set +e -o pipefail
          # -q prints only error blocks. We deliberately do NOT use
          # --error-exitcode: mpich is not valgrind-clean, so its internal
          # errors would flap the gate. Instead we gate on whether any error
          # block cites a HICAR Fortran source (.F90) — the real signal, and
          # robust to mpich/libc/ld noise. --track-origins reports where an
          # uninitialised value was created (the bit that found the restart bug).
          mpiexec -np 4 valgrind -q \
              --track-origins=yes \
              --leak-check=no --errors-for-leak-kinds=none \
              --num-callers=30 \
              tests/HICAR-tester 2>&1 | tee valgrind.log
          rc=${PIPESTATUS[0]}
          set -e

          fail=0
          echo "----- scanning valgrind output for errors in HICAR Fortran sources -----"
          if grep -qE "[A-Za-z0-9_]+\.F90:[0-9]+" valgrind.log; then
            echo "::error::valgrind reported memory errors citing HICAR Fortran sources (see below / artifact)"
            grep -nE "depends on uninitialised|Use of uninitialised|Invalid (read|write)|Conditional jump|[A-Za-z0-9_]+\.F90:[0-9]+|was created by" valgrind.log || true
            fail=1
          else
            echo "valgrind clean: no error blocks cite a HICAR .F90 source."
          fi
          if [ "$rc" -ne 0 ]; then
            echo "::error::HICAR-tester exited non-zero ($rc) under valgrind (crash or failed unit test)"
            fail=1
          fi
          exit $fail

      - name: Upload valgrind log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: valgrind-log
          path: build/valgrind.log
          if-no-files-found: ignore

  # --- Sign the commit with the required `valgrind` status --------------------
  # Posts the `valgrind` commit status that main's ruleset requires before a PR
  # can merge. Posts success/failure on the SHA that was actually checked out
  # (changed.outputs.head_sha = the full-test commit for the workflow_run lane, or
  # the dispatched branch HEAD = PR head). Only runs when the gate decided to run
  # memcheck (should_run), so a skipped nightly / no-open-PR run posts nothing.
  # always() so a memcheck FAILURE posts a red `valgrind=failure` (clear PR block)
  # instead of leaving the required check perpetually "Expected".
  sign-valgrind:
    needs: [changed, memcheck]
    if: always() && needs.changed.outputs.should_run == 'true'
    runs-on: ubuntu-22.04
    permissions:
      statuses: write
    steps:
      - name: Sign commit (valgrind status)
        env:
          GH_TOKEN: ${{ github.token }}
          SIGN_SHA: ${{ needs.changed.outputs.head_sha }}
          STATE: ${{ needs.memcheck.result == 'success' && 'success' || 'failure' }}
        run: |
          gh api -X POST "/repos/${{ github.repository }}/statuses/${SIGN_SHA}" \
            -f state="$STATE" \
            -f context=valgrind \
            -f description="valgrind memcheck: ${STATE}" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "Signed ${SIGN_SHA} as valgrind=${STATE}"
