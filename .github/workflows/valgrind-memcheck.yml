# Valgrind memcheck of the HICAR unit-test suite (CPU debug build).
#
# SCOPE: CPU debug, HICAR-tester only (integration cases are too slow under
# valgrind; the GPU build can't run under it at all). ~10-50x slower than native,
# so it sits behind the full-test gate. Runs on manual dispatch and after a full-test
# PASS that was either a PR into main (signs the PR HEAD) or a post-merge push to main
# (signs main's HEAD) — posting the required `valgrind` status.
name: Valgrind memcheck

on:
  # Auto-run after the CPU full-test; the memcheck job's `if:` filters to a PASS that
  # was a PR into main or a post-merge push to main.
  workflow_run:
    workflows: ["HICAR full-test (CPU)"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Per-commit for the workflow_run lane (a newer develop push must not cancel an
  # in-flight valgrind for a different commit); per-ref otherwise.
  group: valgrind-${{ github.event.workflow_run.head_sha || github.ref }}
  cancel-in-progress: true

jobs:
  # Memcheck the unit-test suite, but only when there's a reason to:
  #   workflow_run -> a PASSED full-test that was a PR into main (signs PR HEAD) or a
  #                   post-merge push to main (signs main HEAD); develop pushes skipped
  #   manual       -> always
  memcheck:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       (github.event.workflow_run.event == 'pull_request' ||
        (github.event.workflow_run.event == 'push' &&
         github.event.workflow_run.head_branch == 'main')))
    runs-on: ubuntu-22.04
    env:
      HICAR_MODE: debug
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: ./.github/actions/hicar-deps
      - run: bash .github/scripts/hicar_install_utils.sh hicar_install
      - run: bash .github/scripts/hicar_install_utils.sh gen_test_run_data
      - name: Install valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind

      - name: Memcheck unit tests (mpiexec -np 4)
        run: |
          cd build && make test_valgrind

      - name: Upload valgrind log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: valgrind-log
          path: build/valgrind.log
          if-no-files-found: ignore

  sign-valgrind:
    needs: [memcheck]
    if: always() && needs.memcheck.result != 'skipped'
    runs-on: ubuntu-22.04
    permissions:
      statuses: write
    env:
      STATE: ${{ needs.memcheck.result == 'success' && 'success' || 'failure' }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/sign-commit
        with:
          sha: ${{ github.event.workflow_run.head_sha || github.sha }}
          context: valgrind
          state: ${{ env.STATE }}
          description: valgrind memcheck (${{ env.STATE }})
          token: ${{ github.token }}
