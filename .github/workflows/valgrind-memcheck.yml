# Nightly valgrind memcheck of the HICAR unit-test suite (CPU debug build).
#
# WHY: the debug build's -finit-* flags only poison LOCAL/stack variables, not
# heap/allocatable memory. An uninitialised `logical` in an *allocatable* options
# object passed every local test (garbage-false) yet failed on the CI amd64 runner
# (garbage-true). gfortran has no MemorySanitizer, so valgrind --track-origins is
# the only reliable detector for that class — worth keeping.
#
# SCOPE: CPU debug, HICAR-tester only (integration cases are too slow under
# valgrind; the GPU build can't run under it at all). ~10-50x slower than native,
# so it sits behind the full-test gate. Runs nightly, on manual dispatch, and after
# a full-test PASS that was either a PR into main (signs the PR HEAD) or a post-merge
# push to main (signs main's HEAD) — posting the required `valgrind` status.
name: Valgrind memcheck

on:
  # Auto-run after the CPU full-test; the `changed` gate filters to a pass on a
  # commit with an open PR to main.
  workflow_run:
    workflows: ["HICAR full-test (CPU)"]
    types: [completed]
  schedule:
    - cron: '30 3 * * *'   # 03:30 UTC nightly
  workflow_dispatch:

permissions:
  contents: read
  actions: read         # the `changed` gate queries previous runs

concurrency:
  # Per-commit for the workflow_run lane (a newer develop push must not cancel an
  # in-flight valgrind for a different commit); per-ref otherwise.
  group: valgrind-${{ github.event.workflow_run.head_sha || github.ref }}
  cancel-in-progress: true

jobs:
  # Decide whether to run, and on which SHA:
  #   workflow_run -> a PASSED full-test that was a PR into main (sign PR HEAD) or a
  #                   post-merge push to main (sign main HEAD); develop pushes skipped
  #   schedule     -> skip if main is unchanged since the last completed run
  #   manual       -> always
  changed:
    runs-on: ubuntu-22.04
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      head_sha: ${{ steps.check.outputs.head_sha }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          event="${{ github.event_name }}"
          # SHA to check out: the full-test commit for workflow_run, else branch HEAD.
          echo "head_sha=${{ github.event.workflow_run.head_sha || github.sha }}" >> "$GITHUB_OUTPUT"

          if [ "$event" = "workflow_run" ]; then
            concl="${{ github.event.workflow_run.conclusion }}"
            wf_event="${{ github.event.workflow_run.event }}"
            head_branch="${{ github.event.workflow_run.head_branch }}"
            echo "full-test conclusion=$concl trigger=$wf_event head=$head_branch"
            if [ "$concl" != "success" ]; then
              echo "full-test did not pass — skipping."
              echo "should_run=false" >> "$GITHUB_OUTPUT"; exit 0
            fi
            # full-test's pull_request trigger is main-only, so any PR-triggered
            # full-test IS a main-PR gate. Also run after a post-merge push to main.
            if [ "$wf_event" = "pull_request" ] || { [ "$wf_event" = "push" ] && [ "$head_branch" = "main" ]; }; then
              echo "full-test passed on a main PR / post-merge main — running valgrind."
              echo "should_run=true" >> "$GITHUB_OUTPUT"
            else
              echo "full-test was a develop push (no main gate) — skipping valgrind."
              echo "should_run=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          if [ "$event" != "schedule" ]; then
            echo "Event '$event' is a manual/explicit trigger — running."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # On any API error, fall back to empty so we run rather than skip.
          last_sha=$(gh api \
            "/repos/${{ github.repository }}/actions/workflows/valgrind-memcheck.yml/runs?branch=main&status=completed&per_page=1&exclude_pull_requests=true" \
            --jq '.workflow_runs[0].head_sha // ""') || last_sha=""
          cur_sha="${{ github.sha }}"
          echo "current main SHA:  $cur_sha"
          echo "last run main SHA: ${last_sha:-<none>}"
          if [ -z "$last_sha" ]; then
            echo "No previous run found — running."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [ "$last_sha" = "$cur_sha" ]; then
            echo "main unchanged since the last run — skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "main advanced since the last run — running."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  memcheck:
    needs: changed
    if: needs.changed.outputs.should_run == 'true'
    runs-on: ubuntu-22.04
    env:
      HICAR_MODE: debug
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # workflow_run defaults to main's HEAD; use the full-test commit instead
          # (a no-op for schedule/manual).
          ref: ${{ needs.changed.outputs.head_sha }}
      - uses: ./.github/actions/hicar-deps
      - run: bash .github/scripts/hicar_install_utils.sh hicar_install
      - run: bash .github/scripts/hicar_install_utils.sh gen_test_run_data
      - name: Install valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind

      - name: Memcheck unit tests (mpiexec -np 4)
        run: |
          export LD_LIBRARY_PATH="$HOME/installdir/lib:$LD_LIBRARY_PATH"
          cd build
          # Capture the tester's exit code and post-process the log ourselves.
          set +e -o pipefail
          # No --error-exitcode: mpich isn't valgrind-clean, so we gate on whether
          # any error block cites a HICAR .F90 (the real signal, robust to mpich/
          # libc/ld noise). --track-origins reports where the value was created.
          mpiexec -np 4 valgrind -q \
              --track-origins=yes \
              --leak-check=no --errors-for-leak-kinds=none \
              --num-callers=30 \
              tests/HICAR-tester 2>&1 | tee valgrind.log
          rc=${PIPESTATUS[0]}
          set -e

          fail=0
          echo "----- scanning valgrind output for errors in HICAR Fortran sources -----"
          if grep -qE "[A-Za-z0-9_]+\.F90:[0-9]+" valgrind.log; then
            echo "::error::valgrind reported memory errors citing HICAR Fortran sources (see artifact)"
            grep -nE "depends on uninitialised|Use of uninitialised|Invalid (read|write)|Conditional jump|[A-Za-z0-9_]+\.F90:[0-9]+|was created by" valgrind.log || true
            fail=1
          else
            echo "valgrind clean: no error blocks cite a HICAR .F90 source."
          fi
          if [ "$rc" -ne 0 ]; then
            echo "::error::HICAR-tester exited non-zero ($rc) under valgrind (crash or failed unit test)"
            fail=1
          fi
          exit $fail

      - name: Upload valgrind log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: valgrind-log
          path: build/valgrind.log
          if-no-files-found: ignore

  # Post the required `valgrind` status on the checked-out SHA. always() so a
  # FAILURE posts a red status (clear PR block) rather than leaving it "Expected";
  # gated on should_run so a skipped nightly / no-open-PR run posts nothing.
  sign-valgrind:
    needs: [changed, memcheck]
    if: always() && needs.changed.outputs.should_run == 'true'
    runs-on: ubuntu-22.04
    permissions:
      statuses: write
    env:
      STATE: ${{ needs.memcheck.result == 'success' && 'success' || 'failure' }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/sign-commit
        with:
          sha: ${{ needs.changed.outputs.head_sha }}
          context: valgrind
          state: ${{ env.STATE }}
          description: valgrind memcheck (${{ env.STATE }})
          token: ${{ github.token }}
