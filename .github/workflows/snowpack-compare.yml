# SNOWPACK implementation comparison (CPU / GNU, GitHub-hosted).
#
# Builds HICAR twice on the same gfortran toolchain, differing only in the snow
# driver, and checks that the native-Fortran SNOWPACK port tracks the C++
# Alpine3D/SNOWPACK reference on a full-model run from a prescribed snowpack:
#
#   reference: -DSNOWPACK_CPP=ON  (C++ bindings, sm_SNOWPACK.F90)
#   candidate: default build      (native-Fortran port, snowpack_driver.F90 —
#                                  the port is now the default snow model)
#
# A 3 h Standard-domain run is seeded with a 14-layer / 1 m snowpack on every
# land cell (tests/snowpack/make_snowpack_init.py), then all output variables are compared
# against tests/snowpack/tolerances_snowpack.yaml. See tests/snowpack/test_snowpack_compare.sh.
#
# Triggers: PRs touching the snow drivers, nightly, and manual.
name: SNOWPACK C++ vs Fortran

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/physics/sm_SNOWPACK.F90'
      - 'src/physics/sm_driver.F90'
      - 'cmake/FindSNOWPACK.cmake'
      - 'tests/snowpack/**'
      - 'tests/Test_Cases/input/nml_gen_scripts/SNOWPACK_Compare.sh'
      - '.github/workflows/snowpack-compare.yml'
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC nightly
  workflow_dispatch:
    inputs:
      bless:
        description: >-
          On PASS, bless this commit as the SNOWPACK parity reference
          (posts hicar-snowpack-parity-blessed=success with the upstream
          SNOWPACK SHA — the diff anchor for snowpack_divergence_report.sh)
        type: boolean
        required: false
        default: false
      reason:
        description: Audit note for the bless (why the parity anchor moves)
        type: string
        required: false

concurrency:
  group: snowpack-compare-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # parity bless archives its evidence as a GitHub release
  statuses: write   # for the optional parity bless (workflow_dispatch with bless=true)

jobs:
  snowpack-compare:
    runs-on: ubuntu-22.04
    env:
      # Release (-O3) for BOTH builds: the C++ SNOWPACK library is always built
      # -O3, so a debug HICAR would run the Fortran port at -O0 against the C++
      # physics at -O3 — a mismatched optimization level that pollutes the tight
      # numerical comparison with FP-reordering noise. Release puts both snow
      # implementations at -O3 for a like-for-like comparison (and is far faster).
      HICAR_MODE: release
    steps:
      # Fail fast if a bless was requested by someone below maintainer: posting
      # the parity status is restricted to admin/maintain roles, so don't burn
      # a 40-minute double build on a dispatch that cannot bless. (Plain runs
      # without bless=true are unaffected.)
      - name: Verify maintainer permission for bless
        if: github.event_name == 'workflow_dispatch' && inputs.bless
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          role=$(gh api "/repos/${{ github.repository }}/collaborators/${{ github.actor }}/permission" \
                   --jq '.role_name // .permission')
          echo "actor=${{ github.actor }} role=$role"
          case "$role" in
            admin|maintain) echo "Bless authorized." ;;
            *) echo "::error::Parity bless is restricted to repo admins/maintainers (actor role: $role)"; exit 1 ;;
          esac

      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/cache@v4
        with:
          path: ~/installdir
          key: hicar-deps-${{ runner.os }}-${{ hashFiles('.github/scripts/hicar_install_utils.sh') }}
          restore-keys: hicar-deps-${{ runner.os }}-

      - name: Install dependencies
        run: bash .github/scripts/hicar_install_utils.sh hicar_dependencies

      # --- Build A: C++ SNOWPACK (reference) ---------------------------------
      - name: Build HICAR with C++ SNOWPACK
        env:
          HICAR_CMAKE_EXTRA: "-DSNOWPACK_CPP=ON"
        run: |
          bash .github/scripts/hicar_install_utils.sh hicar_install
          cp bin/HICAR "$GITHUB_WORKSPACE/HICAR_snowpack_cpp"

      # --- Build B: native-Fortran SNOWPACK (candidate) ----------------------
      # hicar_install wipes build/* and rebuilds; the C++ exe is already saved.
      # The native-Fortran port is the default snow model, so no SNOWPACK flag is
      # needed here — this is the default build (with OpenACC off for the GNU CPU
      # comparison).
      - name: Build HICAR with native-Fortran SNOWPACK
        env:
          HICAR_CMAKE_EXTRA: "-DOPENACC=OFF"
        run: |
          bash .github/scripts/hicar_install_utils.sh hicar_install
          cp bin/HICAR "$GITHUB_WORKSPACE/HICAR_snowpack_fortran"

      # --- Forcing/test data (build/ is configured from Build B) -------------
      - name: Download test forcing data
        run: cd build && make download_test_data

      # --- Run the comparison ------------------------------------------------
      - name: Compare C++ vs Fortran SNOWPACK
        run: |
          # No rank count passed: the harness picks min(10, available cores), so
          # it scales to the runner instead of oversubscribing a small one.
          bash tests/snowpack/test_snowpack_compare.sh "$GITHUB_WORKSPACE" \
            "$GITHUB_WORKSPACE/HICAR_snowpack_cpp" \
            "$GITHUB_WORKSPACE/HICAR_snowpack_fortran"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snowpack-compare-diagnostics
          path: |
            tests/figures/snowpack_compare/**
            tests/Test_Cases/input/SNOWPACK_*.err
          if-no-files-found: ignore

  # --- Parity bless: separate job behind the `parity-bless` Environment ------
  # Runs only on manual dispatch with bless=true AND only if the comparison job
  # succeeded (`needs`). The Environment must be configured in Settings >
  # Environments > parity-bless with REQUIRED REVIEWERS (repo owners): GitHub
  # then pauses this job until a designated reviewer approves it in the UI —
  # platform-enforced, independent of anything in this file. The job downloads
  # the comparison evidence artifact; the bless script reads the SNOWPACK
  # anchor SHA from its parity_meta.txt and re-verifies PASS + commit identity.
  # NB: if the Environment does not exist yet, the first run auto-creates it
  # WITHOUT protection rules — configure the required reviewers before relying
  # on this gate.
  bless:
    needs: snowpack-compare
    if: github.event_name == 'workflow_dispatch' && inputs.bless
    runs-on: ubuntu-22.04
    environment: parity-bless
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: snowpack-compare-diagnostics
          path: tests

      - name: Bless SNOWPACK parity
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bash tests/snowpack/test_snowpack_compare.sh "$GITHUB_WORKSPACE" --bless \
            --reason "${{ inputs.reason || 'snowpack-compare pass' }}"
