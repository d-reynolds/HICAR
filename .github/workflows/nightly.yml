# Nightly breadth on GitHub-hosted runners (GNU / CPU): the full integration
# config set + reproducibility. The per-PR gate (pr.yml) runs only a fast
# subset; this is where the wider configuration matrix lives.
#
# The GPU nightly lives in gpu.yml (its own schedule). Phase 4 will expand the
# matrix here to a pairwise-covering config set.
name: Nightly CI (GNU / CPU)

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC nightly
  workflow_dispatch:

jobs:
  nightly:
    runs-on: ubuntu-22.04
    permissions:
      actions: read
      contents: read
    env:
      HICAR_MODE: debug   # debug build: bounds + finit-real=nan catch latent crashes
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/installdir
          key: hicar-deps-${{ runner.os }}-${{ hashFiles('.github/scripts/hicar_install_utils.sh') }}
          restore-keys: hicar-deps-${{ runner.os }}-

      - name: Build dependencies
        run: bash .github/scripts/hicar_install_utils.sh hicar_dependencies
      - name: Build HICAR
        run: bash .github/scripts/hicar_install_utils.sh hicar_install
      - name: Build test executable + fetch test data
        run: bash .github/scripts/hicar_install_utils.sh gen_test_run_data

      # Full integration config set (restart cases are auto-ordered after their base).
      - name: Integration (all configs)
        run: |
          cd tests/Test_Cases
          bash test_case_runner.sh "$GITHUB_WORKSPACE" \
            "Standard,Standard_restart,Nested,Nested_restart"

      - name: Reproducibility (decomposition + restart)
        run: bash tests/test_reproducibility.sh "$GITHUB_WORKSPACE" all

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-diagnostics
          path: |
            tests/Test_Cases/input/*.out
            tests/Test_Cases/input/*.err
            tests/figures/**
          if-no-files-found: ignore
