# except for the badge creation, keep icar-main-commit.yml jobs in parity
name: HICAR Pull Request Actions
on:
  pull_request:
    branches: [master, develop]
  push:

  workflow_dispatch:

jobs:
  build_and_test_HICAR:
    runs-on: ubuntu-latest
    # make sure these permissions are set so that
    # VS Code can connect to the machine
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/installdir
          key: hicar-deps-${{ runner.os }}-${{ hashFiles('.github/scripts/hicar_install_utils.sh') }}
          restore-keys: hicar-deps-${{ runner.os }}-

      # Build Dependencies then HICAR
      - name: Dependencies
        run: bash .github/scripts/hicar_install_utils.sh hicar_dependencies
      - name: Build
        run: bash .github/scripts/hicar_install_utils.sh hicar_install

      # Build test executable and download test data
      - name: Generate Test Run Data
        run: bash .github/scripts/hicar_install_utils.sh gen_test_run_data

      # Run tests in separate steps for better CI reporting
      - name: CLI Options Tests
        run: bash tests/test_cli_options.sh $GITHUB_WORKSPACE
      - name: Unit Tests
        run: cd build && mpiexec -np 4 tests/HICAR-tester
      - name: Integration Tests
        run: |
          cd tests/Test_Cases
          bash test_case_runner.sh $GITHUB_WORKSPACE Standard

      - name: Validate regression hash
        run: |
          REF_HASH=$(head -n1 tests/regression_commit.txt | tr -d '[:space:]')
          CURRENT_HEAD=$(git rev-parse HEAD)
          if [ "$REF_HASH" = "$CURRENT_HEAD" ]; then
            echo "::error::regression_commit.txt points to HEAD — test would trivially pass"
            exit 1
          fi
          if ! git cat-file -t "$REF_HASH" &>/dev/null; then
            echo "::error::Invalid hash in regression_commit.txt: $REF_HASH"
            exit 1
          fi
          echo "Regression hash validated: $REF_HASH"

      - name: Cache regression binary
        uses: actions/cache@v4
        with:
          path: bin/HICAR_old_tester
          key: regression-${{ hashFiles('tests/regression_commit.txt') }}

      - name: Regression Test
        run: |
          cd tests/Test_Cases
          bash $GITHUB_WORKSPACE/tests/test_regression.sh $GITHUB_WORKSPACE $GITHUB_WORKSPACE/build
