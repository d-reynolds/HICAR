# ---------------------------------------------------------------------------
# HICAR GPU-vs-CPU comparison tolerances  (tests/scripts/compare_cpu_gpu.sh)
# ---------------------------------------------------------------------------
# AUTO-TUNED to the accepted CPU<->GPU cross-lane spread of the Standard case
# (NVHPC, same commit, OPENACC OFF vs ON). These gate "did the GPU diverge
# MEANINGFULLY beyond FP-reordering noise?" -- they are NOT scientific bounds.
# A value passes when:   |candidate - baseline| <= atol + rtol*|baseline|
# and a variable passes when no more than frac*n_finite cells violate that.
#
# Tuning method (regenerate by re-running the comparison + the tuning step):
#   * tight fields keep their rtol/atol and absorb the few outlying cells via
#     `frac` (used only where <=2% of cells exceed the tight bound);
#   * fields whose cross-lane difference is widespread instead get atol widened
#     to ~1.5x the observed max|delta| (near-zero-amplified diagnostics and
#     threshold-flip fields: hpbl, sfc_Ri, mol, exchange coeffs, ...).
# NaN/Inf introduced by the candidate ALWAYS fails regardless of these numbers.
# ---------------------------------------------------------------------------

defaults:
  rtol: 0.0001
  atol: 1e-07

variables:
  blk_ri:                    {rtol: 0.0001, atol: 1e-07, frac: 0.025}       # max|d|=0.0213, 1.21% cells outlying
