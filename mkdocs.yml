site_name: HICAR
site_description: The High-resolution Intermediate Complexity Atmospheric Research model
repo_url: https://github.com/HICAR-Model/HICAR
repo_name: HICAR-Model/HICAR
theme: material

features:
  - navigation.tabs          # top-level sections as header tabs
  - navigation.tabs.sticky   # tabs stay visible when scrolling
  - navigation.sections      # sub-sections grouped in the sidebar
  - navigation.top           # back-to-top button
  - navigation.indexes       # section landing pages
  - toc.integrate            # fold the right-hand TOC into the sidebar
  - toc.follow
  - content.code.copy
  - content.code.annotate

nav:
  - Home: index.md
  - Tutorial: tutorial.md
  - Compiling: compiling.md
  - Running: running.md
  - Namelist options: namelist_options.md
  - AI assistant (MCP): mcp.md
  - Forcing data: forcing_data.md
  - Domain generation: domain_generation.md
  - Testing: testing.md
  - CI/CD pipeline: ci_cd_pipeline.md
  - Code overview: code_overview.md
  - Developing: dev_info.md
  - FAQ: FAQ.md
  - Errors: errors.md
